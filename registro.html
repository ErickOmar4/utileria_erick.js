<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="register-container">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Registro de Usuario</h2>
                
                <form id="registroForm">
                    <!-- Nombre -->
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ingresa tu nombre"
                            onblur="if(soloLetras(this.value)){document.getElementById('nombre-error').style.display = 'none';}else{document.getElementById('nombre-error').style.display = 'inline';}">
                        <span class="emergent-label" id="nombre-error">Solo letras</span>
                    </div>

                    <!-- Correo -->
                    <div class="form-group">
                        <label for="correo">Correo Electronico</label>
                        <input type="email" id="correo" placeholder="ejemplo@dominio.com"
                            onblur="if(validarCorreo(this.value)){document.getElementById('correo-error').style.display = 'none';}else{document.getElementById('correo-error').style.display = 'inline';}">
                        <span class="emergent-label" id="correo-error">Correo invalido</span>
                    </div>

                    <!-- Telefono -->
                    <div class="form-group">
                        <label for="telefono">Telefono (10 digitos)</label>
                        <input type="tel" id="telefono" placeholder="5512345678"
                            onblur="if(validarTelefono(this.value)){document.getElementById('telefono-error').style.display = 'none';}else{document.getElementById('telefono-error').style.display = 'inline';}">
                        <span class="emergent-label" id="telefono-error">Telefono invalido</span>
                    </div>

                    <!-- Fecha de Nacimiento -->
                    <div class="form-group">
                        <label for="fechaNacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNacimiento">
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Minimo 8 caracteres"
                            onblur="if(validarPassword(this.value)){document.getElementById('password-error').style.display = 'none';}else{document.getElementById('password-error').style.display = 'inline';}">
                        <span class="emergent-label" id="password-error">Contraseña debil</span>
                    </div>

                    <!-- Confirmar Password -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" placeholder="Repite la contraseña"
                            onblur="if(this.value === document.getElementById('password').value){document.getElementById('confirm-error').style.display = 'none';}else{document.getElementById('confirm-error').style.display = 'inline';}">
                        <span class="emergent-label" id="confirm-error">Las contraseñas no coinciden</span>
                    </div>

                    <button type="button" class="btn btn-primary" onclick="registrarUsuario()">Registrarse</button>
                </form>

                <div class="text-center mt-3">
                    <a href="index.html" class="link">¿Ya tienes cuenta? Inicia Sesion</a>
                </div>
            </div>
        </div>
    </div>

    <script src="css/styles.css"></script>
    <script>
        const registrarUsuario = () => {
            // Obtener valores
            const nombre = document.getElementById('nombre').value.trim();
            const correo = document.getElementById('correo').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const fecha = document.getElementById('fechaNacimiento').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validaciones
            if (!soloLetras(nombre)) {
                mostrarModalError('El nombre solo debe contener letras');
                return;
            }

            if (!validarCorreo(correo)) {
                mostrarModalError('Ingresa un correo valido');
                return;
            }

            if (!validarTelefono(telefono)) {
                mostrarModalError('Ingresa un telefono valido (10 digitos)');
                return;
            }

            if (!esMayorDeEdad(fecha)) {
                mostrarModalError('Debes ser mayor de edad (18 años o mas)');
                return;
            }

            if (!validarPassword(password)) {
                mostrarModalError('La contraseña debe tener: mayuscula, minuscula, numero, caracter especial y minimo 8 caracteres');
                return;
            }

            if (password !== confirmPassword) {
                mostrarModalError('Las contraseñas no coinciden');
                return;
            }

            // Guardar usuario
            guardarUsuario(correo, password);

            // Calcular edad
            const edad = calcularEdad(fecha);

            // Mostrar modal de exito
            mostrarModalRegistro(nombre, correo, telefono, edad);
        };
    </script>
</body>
</html>
